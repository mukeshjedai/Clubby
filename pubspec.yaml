name: zello_like_mvp
description: Zello-like Flutter MVP with push-to-talk UI and local voice flow.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  record: ^6.1.1
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  path: ^1.9.0
  geolocator: ^13.0.2
  google_maps_flutter: ^2.12.1
  image_picker: ^1.1.2
  cryptography: ^2.7.0
  http: ^1.3.0
  azure_communication_calling: ^1.0.4
  shared_preferences: ^2.3.3
  workmanager: ^0.9.0+2
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
